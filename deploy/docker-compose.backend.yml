services:
  web-backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm ci && npm ci --prefix backend && npm run build && npm run start --prefix backend"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - UPSTREAM_CHAT_BASE_URL=http://host.docker.internal:8050
      - UPSTREAM_CHAT_STREAM_PATH=/chat/stream
